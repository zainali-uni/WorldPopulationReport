version: '3.8'

services:

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: world
    ports:
      - "3306:3306"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d

  reportapp_app:
    build: .
    container_name: reportapp_app
    depends_on:
      - mysql_db
    restart: on-failure
